services:
  db:
    image: docker-mirror.pmrudc.com/library/postgres:17-alpine
    environment:
      POSTGRES_DB: maptory
      POSTGRES_USER: maptory
      POSTGRES_PASSWORD: maptory_password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U maptory"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8007:8007"
    environment:
      DATABASE_URL: postgresql+asyncpg://maptory:maptory_password@db:5432/maptory
      SECRET_KEY: change-me-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

volumes:
  pgdata:
  uploads:
